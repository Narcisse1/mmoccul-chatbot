version: '3.8'

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: mmoccul-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: mmoccul_chatbot
      MYSQL_USER: ${DB_USER:-mmoccul_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secure_password}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - mmoccul-network

  # Application
  app:
    build: .
    container_name: mmoccul-chatbot
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: mysql://${DB_USER:-mmoccul_user}:${DB_PASSWORD:-secure_password}@db:3306/mmoccul_chatbot
      JWT_SECRET: ${JWT_SECRET}
      VITE_APP_ID: ${VITE_APP_ID}
      OAUTH_SERVER_URL: ${OAUTH_SERVER_URL:-https://api.manus.im}
      VITE_OAUTH_PORTAL_URL: ${VITE_OAUTH_PORTAL_URL:-https://login.manus.im}
      BUILT_IN_FORGE_API_URL: ${BUILT_IN_FORGE_API_URL:-https://api.manus.im/forge}
      BUILT_IN_FORGE_API_KEY: ${BUILT_IN_FORGE_API_KEY}
      VITE_FRONTEND_FORGE_API_KEY: ${VITE_FRONTEND_FORGE_API_KEY}
      VITE_FRONTEND_FORGE_API_URL: ${VITE_FRONTEND_FORGE_API_URL:-https://api.manus.im/forge}
      VITE_APP_TITLE: ${VITE_APP_TITLE:-MMOCCUL Support}
      OWNER_NAME: ${OWNER_NAME:-MMOCCUL}
      OWNER_OPEN_ID: ${OWNER_OPEN_ID}
    ports:
      - "3000:3000"
    volumes:
      - ./logs:/app/.manus-logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - mmoccul-network
    restart: unless-stopped

  # Optional: Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: mmoccul-nginx
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - mmoccul-network
    restart: unless-stopped

volumes:
  db_data:
    driver: local

networks:
  mmoccul-network:
    driver: bridge
